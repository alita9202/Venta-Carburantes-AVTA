{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Configuración de Empresa</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Nombre de la Estación</label>
                    <input type="text" class="form-control" name="nombre_estacion" value="{{ empresa.nombre_estacion }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>NIT</label>
                    <input type="text" class="form-control" name="nit" value="{{ empresa.nit }}" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>Dirección</label>
                    <input type="text" class="form-control" name="direccion" value="{{ empresa.direccion }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label>Ciudad</label>
                    <input type="text" class="form-control" name="ciudad" value="{{ empresa.ciudad }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label>Teléfono</label>
                    <input type="text" class="form-control" name="telefono" value="{{ empresa.telefono }}">
                </div>
            </div>

            <hr>
            <h5 class="mb-3">Parámetros de Venta Controlada</h5>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>Stock Mínimo Global (L)</label>
                    <input type="number" step="0.1" class="form-control" name="stock_minimo_global" value="{{ empresa.stock_minimo_global }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label>Factor de Holgura (%)</label>
                    <input type="number" step="0.1" class="form-control" name="factor_holgura" value="{{ empresa.factor_holgura }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label>Cupo Base Cliente Nuevo (L)</label>
                    <input type="number" step="0.1" class="form-control" name="cupo_base_cliente_nuevo" value="{{ empresa.cupo_base_cliente_nuevo }}" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary mt-3">Guardar Cambios</button>
        </form>
    </div>
</div>
{% endblock %}
