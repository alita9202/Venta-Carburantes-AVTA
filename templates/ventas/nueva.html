{% extends "base.html" %}

{% block content %}
<div class="mb-4 d-flex justify-content-between align-items-center">
    <h2>Procesar Nueva Venta</h2>
    <a href="{{ url_for('ventas') }}" class="btn btn-secondary">Volver al Historial</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Placa del Vehículo o CI/NIT del Cliente</label>
                    <input type="text" class="form-control" name="placa_documento" placeholder="Ej: ABC123 o 1234567" required>
                    <small class="text-muted">Si no existe, se registrará automáticamente.</small>
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tanque a Despachar</label>
                    <select name="id_tanque" class="form-control" required>
                        <option value="">Seleccione un tanque...</option>
                        {% for t in tanques %}
                            <option value="{{ t.id_tanque }}">{{ t.identificador }} ({{ t.tipo_carburante }}) - Stock Actual: {{ t.stock_actual }}L</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Cantidad Solicitada (Litros)</label>
                    <input type="number" step="0.1" class="form-control form-control-lg" name="litros_solicitados" required>
                </div>
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-success btn-lg">Validar y Procesar Venta</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
